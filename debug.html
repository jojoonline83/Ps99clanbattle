<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PS99 API Debug</title>
<style>
body { font-family: monospace; background:#0a0e1a; color:#e2e8f0; padding:20px; }
h2 { color:#6366f1; }
pre { background:#111827; padding:16px; border-radius:8px; overflow:auto; white-space:pre-wrap; word-break:break-all; font-size:12px; border:1px solid #1f2d45; max-height:400px; }
button { background:#6366f1; color:#fff; border:none; padding:10px 20px; border-radius:8px; cursor:pointer; margin:8px 4px; font-size:14px; }
</style>
</head>
<body>
<h2>PS99 API Debug</h2>
<button onclick="runAll()">▶ Run All & Copy</button>
<h3>1. activeClanBattle (battle name/dates):</h3>
<pre id="a"></pre>
<h3>2. /api/clans (top 3 by Points):</h3>
<pre id="b"></pre>
<h3>3. /api/clan/{first} (full clan detail — Members + Contribution):</h3>
<pre id="c"></pre>
<script>
const PROXY='https://corsproxy.io/?url=', API='https://biggamesapi.io/api';
async function get(path){
  const url=API+path;
  try{ const r=await fetch(url); if(r.ok) return r.json(); }catch{}
  const r=await fetch(PROXY+encodeURIComponent(url)); return r.json();
}
async function runAll(){
  document.getElementById('a').textContent='fetching…';
  document.getElementById('b').textContent='fetching…';
  document.getElementById('c').textContent='fetching…';
  const battle = await get('/activeClanBattle');
  document.getElementById('a').textContent = JSON.stringify(battle?.data?.configData||battle, null,2);

  const clans = await get('/clans?page=1&pageSize=3&sort=Points&sortOrder=desc');
  document.getElementById('b').textContent = JSON.stringify(clans?.data||clans, null,2);

  const firstName = clans?.data?.[0]?.Name || clans?.data?.[0]?.name || '';
  if(firstName){
    const detail = await get('/clan/'+encodeURIComponent(firstName));
    document.getElementById('c').textContent = JSON.stringify(detail?.data||detail, null,2);
  }

  const all = [
    '=== activeClanBattle ===', document.getElementById('a').textContent,
    '=== clans top 3 ===',      document.getElementById('b').textContent,
    '=== clan detail ===',      document.getElementById('c').textContent,
  ].join('\n\n');
  await navigator.clipboard.writeText(all);
  alert('All copied to clipboard! Paste it to Claude.');
}
</script>
</body>
</html>
